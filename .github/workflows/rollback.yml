# ==============================================================================
# Rollback — Emergency Helm Rollback for Failed Deployments
# ==============================================================================
# Manually triggered to roll back a Helm release to a previous revision.
# Supports both specific revision rollback and "previous" shorthand.
# ==============================================================================

name: Rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to roll back'
        required: true
        type: choice
        options: [dev, staging, prod]
      revision:
        description: 'Helm revision to roll back to (leave empty for previous)'
        required: false
        type: string
      confirm:
        description: 'Type "ROLLBACK" to confirm'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

env:
  CLUSTER_NAME: ${{ secrets.CLUSTER_NAME }}
  REGION: ${{ secrets.REGION }}
  GKE_CLUSTER_PREFIX: gke
  GKE_REGION: ${{ secrets.REGION }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  validate:
    name: Validate Rollback Request
    runs-on: ubuntu-latest
    steps:
      - name: Confirm rollback intent
        run: |
          set -e
          if [[ "${{ github.event.inputs.confirm }}" != "ROLLBACK" ]]; then
            echo "::error::Rollback not confirmed. You must type 'ROLLBACK' to proceed."
            exit 1
          fi

          REVISION="${{ github.event.inputs.revision }}"
          if [[ -n "$REVISION" && ! "$REVISION" =~ ^[0-9]+$ ]]; then
            echo "::error::Invalid revision '$REVISION'. Revision must be a positive integer."
            exit 1
          fi

          if [[ "$REVISION" == "0" ]]; then
            echo "::error::Revision '0' is reserved for 'previous'. Leave revision empty to target previous."
            exit 1
          fi

          echo "Rollback confirmed for environment: ${{ github.event.inputs.environment }}"

  preflight:
    name: Preflight Checks
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Validate required secrets
        run: |
          set -e
          echo "::group::Secret presence check"
          MISSING=()

          [[ -z "${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}" ]] && MISSING+=("WORKLOAD_IDENTITY_PROVIDER")
          [[ -z "${{ secrets.SERVICE_ACCOUNT }}"            ]] && MISSING+=("SERVICE_ACCOUNT")
          [[ -z "${{ secrets.PROJECT_ID }}"                 ]] && MISSING+=("PROJECT_ID")
          [[ -z "${{ secrets.REGION }}"                     ]] && MISSING+=("REGION")

          if [[ ${#MISSING[@]} -gt 0 ]]; then
            echo "::error::Missing required GitHub secrets: ${MISSING[*]}"
            echo "Add these secrets under Settings -> Secrets and variables -> Actions"
            exit 1
          fi
          echo "All required secrets are present."
          echo "::endgroup::"

      - uses: actions/checkout@v5

      - name: Authenticate to GCP
        uses: ./.github/actions/gcp-auth
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}
          project_id: ${{ secrets.PROJECT_ID }}
          setup_gke: 'true'
          gke_cluster: ${{ env.GKE_CLUSTER_PREFIX }}-${{ github.event.inputs.environment }}
          gke_location: ${{ env.GKE_REGION }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.17.0'

      - name: Validate cluster and release state
        run: |
          set -e
          echo "::group::Rollback prerequisites"
          kubectl cluster-info >/dev/null
          kubectl get namespace ecommerce >/dev/null

          if ! helm status ecommerce -n ecommerce >/dev/null 2>&1; then
            echo "::error::Helm release 'ecommerce' not found in namespace 'ecommerce'"
            exit 1
          fi

          HISTORY_JSON=$(helm history ecommerce -n ecommerce -o json)
          HISTORY_COUNT=$(echo "$HISTORY_JSON" | jq 'length')
          if [[ "$HISTORY_COUNT" -lt 2 ]]; then
            echo "::error::Rollback requires at least 2 revisions. Current history length: $HISTORY_COUNT"
            exit 1
          fi

          TARGET_REVISION="${{ github.event.inputs.revision }}"
          if [[ -n "$TARGET_REVISION" ]]; then
            if ! echo "$HISTORY_JSON" | jq -e --arg rev "$TARGET_REVISION" 'map(.revision|tostring) | index($rev) != null' >/dev/null; then
              echo "::error::Requested revision '$TARGET_REVISION' not found in helm history"
              echo "Available revisions:"
              echo "$HISTORY_JSON" | jq -r '.[].revision'
              exit 1
            fi
          fi

          echo "Cluster connectivity, namespace, and release history checks passed."
          echo "::endgroup::"

      - name: Preflight summary
        if: always()
        run: |
          echo "## Rollback Preflight Checks" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Secrets present | ${{ job.status == 'success' && '✅' || '❌' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| GCP OIDC auth   | ${{ job.status == 'success' && '✅' || '❌' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| GKE access      | ${{ job.status == 'success' && '✅' || '❌' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Helm release state | ${{ job.status == 'success' && '✅' || '❌' }} |" >> "$GITHUB_STEP_SUMMARY"

  rollback:
    name: Rollback — ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    needs: [validate, preflight]
    environment: ${{ github.event.inputs.environment == 'prod' && 'production' || github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@v5

      - name: Authenticate to GCP
        uses: ./.github/actions/gcp-auth
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}
          project_id: ${{ secrets.PROJECT_ID }}
          setup_gke: 'true'
          gke_cluster: ${{ env.GKE_CLUSTER_PREFIX }}-${{ github.event.inputs.environment }}
          gke_location: ${{ env.GKE_REGION }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.17.0'

      - name: Pre-rollback snapshot
        run: |
          echo "::group::Current State"
          echo "### Helm History"
          helm history ecommerce -n ecommerce --max 10 || echo "No history found"
          echo ""
          echo "### Current Pods"
          kubectl get pods -n ecommerce -o wide 2>/dev/null || echo "No pods"
          echo "::endgroup::"

      - name: Execute rollback
        id: rollback
        run: |
          echo "::group::Helm Rollback"
          ENV="${{ github.event.inputs.environment }}"
          REVISION="${{ github.event.inputs.revision }}"

          if [[ -z "$REVISION" ]]; then
            echo "Rolling back to previous revision..."
            helm rollback ecommerce 0 -n ecommerce --wait --timeout 5m
          else
            echo "Rolling back to revision $REVISION..."
            helm rollback ecommerce "$REVISION" -n ecommerce --wait --timeout 5m
          fi

          NEW_REVISION=$(helm history ecommerce -n ecommerce --max 1 -o json | jq -r '.[0].revision')
          echo "revision=$NEW_REVISION" >> "$GITHUB_OUTPUT"
          echo "::endgroup::"

      - name: Verify rollback health
        run: |
          echo "::group::Post-Rollback Health Check"
          kubectl rollout status deployment/ecommerce-frontend \
            -n ecommerce --timeout=120s

          READY_PODS=$(kubectl get pods -n ecommerce -l app.kubernetes.io/component=frontend \
            -o jsonpath='{.items[*].status.conditions[?(@.type=="Ready")].status}' | tr ' ' '\n' | grep -c True || true)
          echo "Ready pods: $READY_PODS"

          if [[ "$READY_PODS" -lt 1 ]]; then
            echo "::error::Rollback verification failed — no pods are ready"
            exit 1
          fi
          echo "Rollback verified successfully"
          echo "::endgroup::"

      - name: Rollback summary
        if: always()
        run: |
          echo "## Rollback — ${{ github.event.inputs.environment }}" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Status | \`${{ job.status }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment | \`${{ github.event.inputs.environment }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Target Revision | \`${{ github.event.inputs.revision || 'previous' }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| New Revision | \`${{ steps.rollback.outputs.revision }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Actor | @${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Timestamp | $(date -u +%Y-%m-%dT%H:%M:%SZ) |" >> "$GITHUB_STEP_SUMMARY"
