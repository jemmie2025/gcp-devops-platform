# ==============================================================================
# CI Pipeline — Pull Request Validation
# ==============================================================================
# Runs on every PR to main. Gates merge with:
#   - Frontend linting & build verification
#   - Docker image build test (no push)
#   - Container security scanning (Trivy)
#   - Helm chart linting
# ==============================================================================

name: CI — Validate

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write   # For Trivy SARIF upload

env:
  NODE_VERSION: '22'
  REGISTRY: europe-west1-docker.pkg.dev
  IMAGE_NAME: europe-west1-docker.pkg.dev/${{ secrets.PROJECT_ID }}/ecommerce-frontend/ecommerce-frontend
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Preflight — fail-fast validation before running expensive CI jobs
  # ──────────────────────────────────────────────────────────────────────────
  preflight:
    name: Preflight Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Validate repository structure and required files
        run: |
          set -e
          echo "::group::Repository preflight checks"
          REQUIRED=(
            "client/package.json"
            "client/Dockerfile"
            "helm/charts/ecommerce/Chart.yaml"
            "helm/values/dev.yaml"
          )

          for FILE in "${REQUIRED[@]}"; do
            [[ -f "$FILE" ]] || { echo "::error::Missing required file: $FILE"; exit 1; }
          done

          [[ -d client/src ]] || { echo "::error::Missing expected directory: client/src"; exit 1; }
          [[ -d helm/charts/ecommerce/templates ]] || { echo "::error::Missing expected directory: helm/charts/ecommerce/templates"; exit 1; }

          echo "Repository structure checks passed."
          echo "::endgroup::"

      - name: Validate JSON and YAML syntax for critical manifests
        run: |
          set -e
          echo "::group::Manifest syntax checks"
          node -e "JSON.parse(require('fs').readFileSync('client/package.json', 'utf8')); console.log('client/package.json valid JSON')"
          if [[ -f client/package-lock.json ]]; then
            node -e "JSON.parse(require('fs').readFileSync('client/package-lock.json', 'utf8')); console.log('client/package-lock.json valid JSON')"
          else
            echo "::warning::client/package-lock.json not found; CI will use npm install fallback"
          fi
          python3 - <<'PY'
          from pathlib import Path
          import sys

          required = [
            "helm/charts/ecommerce/Chart.yaml",
            "helm/values/dev.yaml",
          ]

          for file in required:
            text = Path(file).read_text(encoding="utf-8")
            if not text.strip():
              print(f"::error::Empty YAML file: {file}")
              sys.exit(1)
          print("Critical YAML manifests are non-empty and readable")
          PY
          echo "::endgroup::"

      - name: Preflight summary
        if: always()
        run: |
          echo "## CI Preflight" >> "$GITHUB_STEP_SUMMARY"
          echo "- Repository structure: checked" >> "$GITHUB_STEP_SUMMARY"
          echo "- Critical manifests: checked" >> "$GITHUB_STEP_SUMMARY"

  # ──────────────────────────────────────────────────────────────────────────
  # Frontend Lint & Build
  # ──────────────────────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    needs: preflight
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            client/package-lock.json
            client/npm-shrinkwrap.json

      - name: Install dependencies (lockfile-aware)
        run: |
          set -e
          if [[ -f package-lock.json ]]; then
            npm ci --legacy-peer-deps
          else
            echo "::warning::No package-lock.json found; using npm install fallback"
            npm install --legacy-peer-deps
          fi

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: frontend-build
          path: client/dist/
          retention-days: 1

  # ──────────────────────────────────────────────────────────────────────────
  # Docker Build Test (no push) + Security Scan
  # ──────────────────────────────────────────────────────────────────────────
  docker-build-test:
    name: Docker — Build & Scan
    runs-on: ubuntu-latest
    needs: frontend-build
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (test only — no push)
        uses: docker/build-push-action@v7
        with:
          context: ./client
          file: ./client/Dockerfile
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:ci-test
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ──────────────────────────────────────────────────────────────────────────
  # Helm Chart Lint
  # ──────────────────────────────────────────────────────────────────────────
  helm-lint:
    name: Helm — Lint Charts
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - uses: actions/checkout@v5

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.17.0'

      - name: Lint ecommerce chart
        run: helm lint helm/charts/ecommerce/

      - name: Template validation (dev)
        run: |
          helm template ecommerce helm/charts/ecommerce/ \
            --values helm/values/dev.yaml \
            --namespace ecommerce \
            --debug > /dev/null

  # ──────────────────────────────────────────────────────────────────────────
  # CI Summary
  # ──────────────────────────────────────────────────────────────────────────
  ci-status:
    name: CI — Status Gate
    runs-on: ubuntu-latest
    if: always()
    needs: [preflight, frontend-build, docker-build-test, helm-lint]
    steps:
      - name: Check CI results
        run: |
          echo "## CI Results Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Preflight | ${{ needs.preflight.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Frontend Build | ${{ needs.frontend-build.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Docker Build & Scan | ${{ needs.docker-build-test.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Helm Lint | ${{ needs.helm-lint.result }} |" >> "$GITHUB_STEP_SUMMARY"

          if [[ "${{ needs.preflight.result }}" != "success" ]] || \
             [[ "${{ needs.frontend-build.result }}" != "success" ]] || \
             [[ "${{ needs.docker-build-test.result }}" != "success" ]] || \
             [[ "${{ needs.helm-lint.result }}" != "success" ]]; then
            echo ""
            echo "::error::One or more CI checks failed"
            exit 1
          fi
