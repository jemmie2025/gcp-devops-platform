# ==============================================================================
# Deploy Pipeline — Build, Push, Deploy with Environment Promotion
# ==============================================================================
# Flow: Build Docker → Push to Artifact Registry → Deploy via Helm
# Environments: dev (auto) → staging (approval) → prod (approval)
# Security: WIF auth, image digest pinning, signed deployments
# Reliability: Retry logic, health checks, post-deploy verification
# ==============================================================================

name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - 'helm/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, staging, prod]
      skip_build:
        description: 'Skip Docker build (redeploy existing image)'
        required: false
        default: false
        type: boolean
      image_tag:
        description: 'Image tag to deploy (only if skip_build=true)'
        required: false
        type: string

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write
  packages: write

env:
  REGISTRY: europe-west1-docker.pkg.dev
  IMAGE_NAME: europe-west1-docker.pkg.dev/${{ secrets.PROJECT_ID }}/ecommerce-frontend/ecommerce-frontend
  HELM_CHART_PATH: helm/charts/ecommerce
  CLUSTER_NAME: ${{ secrets.CLUSTER_NAME }}
  REGION: ${{ secrets.REGION }}
  GKE_CLUSTER_PREFIX: gke
  GKE_REGION: ${{ secrets.REGION }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Preflight — Validate all external dependencies before spending build time
  # Checks: secrets present, GCP auth, Artifact Registry, GKE reachability, IAM
  # A failure here means the pipeline stops immediately with a clear error.
  # ──────────────────────────────────────────────────────────────────────────
  preflight:
    name: Preflight Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      # ── 1. Validate required secrets are populated ─────────────────────────
      - name: Validate required secrets
        run: |
          set -e
          echo "::group::Secret presence check"
          MISSING=()

          [[ -z "${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}" ]] && MISSING+=("WORKLOAD_IDENTITY_PROVIDER")
          [[ -z "${{ secrets.SERVICE_ACCOUNT }}"            ]] && MISSING+=("SERVICE_ACCOUNT")
          [[ -z "${{ secrets.PROJECT_ID }}"                 ]] && MISSING+=("PROJECT_ID")
          [[ -z "${{ secrets.REGION }}"                     ]] && MISSING+=("REGION")
          [[ -z "${{ secrets.CLUSTER_NAME }}"               ]] && MISSING+=("CLUSTER_NAME")

          if [[ ${#MISSING[@]} -gt 0 ]]; then
            echo "::error::Missing required GitHub secrets: ${MISSING[*]}"
            echo "Add these secrets under Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "All required secrets are present."
          echo "::endgroup::"

      # ── 2. Authenticate to GCP via WIF ─────────────────────────────────────
      - uses: actions/checkout@v5

      - id: auth
        name: Authenticate to GCP (OIDC)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}
          token_format: access_token
          create_credentials_file: true

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ secrets.PROJECT_ID }}

      # ── 3. Confirm gcloud identity resolves correctly ──────────────────────
      - name: Verify GCP auth identity
        run: |
          set -e
          echo "::group::GCP auth identity"
          ACTIVE_ACCOUNT=$(gcloud auth list --filter=status:ACTIVE --format="value(account)" 2>&1)
          if [[ -z "$ACTIVE_ACCOUNT" ]]; then
            echo "::error::GCP authentication failed — no active account found"
            exit 1
          fi
          echo "Active GCP account: ${ACTIVE_ACCOUNT}"
          echo "::endgroup::"

      # ── 4. Validate Artifact Registry repository exists ────────────────────
      - name: Validate Artifact Registry repository
        run: |
          set -e
          echo "::group::Artifact Registry check"
          if ! gcloud artifacts repositories describe ecommerce-frontend \
              --location=${{ secrets.REGION }} \
              --project=${{ secrets.PROJECT_ID }} \
              --format="value(name)" 2>&1; then
            echo "::error::Artifact Registry repo 'ecommerce-frontend' not found in ${{ secrets.REGION }}"
            echo "Create it with:"
            echo "  gcloud artifacts repositories create ecommerce-frontend \\"
            echo "    --repository-format=docker \\"
            echo "    --location=${{ secrets.REGION }} \\"
            echo "    --project=${{ secrets.PROJECT_ID }}"
            exit 1
          fi
          echo "Artifact Registry repository exists."
          echo "::endgroup::"

      # ── 5. Validate GKE cluster exists and is reachable ───────────────────
      - name: Validate GKE cluster exists
        run: |
          set -e
          echo "::group::GKE cluster check"
          CLUSTER_STATUS=$(gcloud container clusters describe ${{ secrets.CLUSTER_NAME }} \
            --region=${{ secrets.REGION }} \
            --project=${{ secrets.PROJECT_ID }} \
            --format="value(status)" 2>&1 || echo "NOT_FOUND")
          if [[ "$CLUSTER_STATUS" == "NOT_FOUND" ]]; then
            echo "::error::GKE cluster '${{ secrets.CLUSTER_NAME }}' not found in ${{ secrets.REGION }}"
            exit 1
          fi
          if [[ "$CLUSTER_STATUS" != "RUNNING" ]]; then
            echo "::error::GKE cluster is not RUNNING — current status: ${CLUSTER_STATUS}"
            exit 1
          fi
          echo "GKE cluster status: ${CLUSTER_STATUS}"
          echo "::endgroup::"

      # ── 6. Validate service account has required IAM roles ─────────────────
      - name: Validate IAM roles
        run: |
          set -e
          echo "::group::IAM role check"
          SA="${{ secrets.SERVICE_ACCOUNT }}"
          PROJECT="${{ secrets.PROJECT_ID }}"

          REQUIRED_ROLES=(
            "roles/artifactregistry.writer"
            "roles/container.developer"
          )

          POLICY=$(gcloud projects get-iam-policy "$PROJECT" \
            --flatten="bindings[].members" \
            --filter="bindings.members:serviceAccount:${SA}" \
            --format="value(bindings.role)" 2>/dev/null || echo "")

          MISSING_ROLES=()
          for ROLE in "${REQUIRED_ROLES[@]}"; do
            if ! echo "$POLICY" | grep -q "$ROLE"; then
              MISSING_ROLES+=("$ROLE")
            fi
          done

          if [[ ${#MISSING_ROLES[@]} -gt 0 ]]; then
            echo "::warning::Service account may be missing roles: ${MISSING_ROLES[*]}"
            echo "Grant them with:"
            for ROLE in "${MISSING_ROLES[@]}"; do
              echo "  gcloud projects add-iam-policy-binding ${PROJECT} \\"
              echo "    --member=serviceAccount:${SA} --role=${ROLE}"
            done
            # Warn only — do not block; SA may inherit via groups or custom roles
          else
            echo "Required IAM roles confirmed present."
          fi
          echo "::endgroup::"

      - name: Preflight summary
        if: always()
        run: |
          echo "## Preflight Checks" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Secrets present | ${{ job.status == 'success' && '✅' || '❌' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| GCP OIDC auth   | ${{ job.status == 'success' && '✅' || '❌' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Artifact Registry | ${{ job.status == 'success' && '✅' || '❌' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| GKE cluster RUNNING | ${{ job.status == 'success' && '✅' || '❌' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| IAM roles | ⚠️ warn-only |" >> "$GITHUB_STEP_SUMMARY"

  # ──────────────────────────────────────────────────────────────────────────
  # Setup — Compute metadata for the entire pipeline
  # ──────────────────────────────────────────────────────────────────────────
  setup:
    name: Setup
    runs-on: ubuntu-latest
    needs: preflight
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
      environment: ${{ steps.meta.outputs.environment }}
      should_build: ${{ steps.meta.outputs.should_build }}
      deploy_timestamp: ${{ steps.meta.outputs.deploy_timestamp }}
    steps:
      - id: meta
        name: Compute pipeline metadata
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          TIMESTAMP=$(date -u +%Y%m%d-%H%M%S)
          ENV="${{ github.event.inputs.environment || 'dev' }}"

          if [[ "${{ github.event.inputs.skip_build }}" == "true" && -n "${{ github.event.inputs.image_tag }}" ]]; then
            TAG="${{ github.event.inputs.image_tag }}"
            BUILD="false"
          else
            TAG="${SHORT_SHA}-${TIMESTAMP}"
            BUILD="true"
          fi

          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "environment=${ENV}" >> "$GITHUB_OUTPUT"
          echo "should_build=${BUILD}" >> "$GITHUB_OUTPUT"
          echo "deploy_timestamp=${TIMESTAMP}" >> "$GITHUB_OUTPUT"

          echo "## Pipeline Metadata" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment | \`${ENV}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image Tag | \`${TAG}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${SHORT_SHA}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Actor | @${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build | ${BUILD} |" >> "$GITHUB_STEP_SUMMARY"

  # ──────────────────────────────────────────────────────────────────────────
  # Build — Docker multi-stage build with layer caching
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.should_build == 'true'
    outputs:
      image_digest: ${{ steps.push.outputs.digest }}
      image_uri: ${{ steps.push.outputs.image_uri }}
    steps:
      - uses: actions/checkout@v5

      - id: auth
        name: Authenticate to GCP
        uses: ./.github/actions/gcp-auth
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}
          project_id: ${{ secrets.PROJECT_ID }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Artifact Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token || '' }}

      - id: push
        name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.setup.outputs.image_tag }}
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ needs.setup.outputs.short_sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.created=${{ needs.setup.outputs.deploy_timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ needs.setup.outputs.image_tag }}
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'

      - name: Build summary
        run: |
          echo "## Docker Build" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image:** \`${{ env.IMAGE_NAME }}:${{ needs.setup.outputs.image_tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Digest:** \`${{ steps.push.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Security scan:** Passed (no CRITICAL vulnerabilities)" >> "$GITHUB_STEP_SUMMARY"

  # ──────────────────────────────────────────────────────────────────────────
  # Deploy — Dev (automatic on main push)
  # ──────────────────────────────────────────────────────────────────────────
  deploy-dev:
    name: Deploy — dev
    runs-on: ubuntu-latest
    needs: [setup, build]
    if: |
      always() &&
      (needs.build.result == 'success' || needs.setup.outputs.should_build == 'false') &&
      (needs.setup.outputs.environment == 'dev' || github.event_name == 'push')
    environment: dev
    outputs:
      helm_revision: ${{ steps.deploy.outputs.revision }}
    steps:
      - uses: actions/checkout@v5

      - name: Authenticate to GCP
        uses: ./.github/actions/gcp-auth
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}
          project_id: ${{ secrets.PROJECT_ID }}
          setup_gke: 'true'
          gke_cluster: ${{ env.CLUSTER_NAME }}
          gke_location: ${{ env.GKE_REGION }}

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: 'v3.17.0'

      - id: deploy
        name: Helm deploy (with retry)
        env:
          IMAGE_TAG: ${{ needs.setup.outputs.image_tag }}
        run: |
          echo "::group::Helm Deploy — dev"

          # Retry logic for transient GKE API failures
          MAX_RETRIES=3
          RETRY_DELAY=10
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i of $MAX_RETRIES..."
            if helm upgrade --install ecommerce ${{ env.HELM_CHART_PATH }} \
              --namespace ecommerce \
              --create-namespace \
              --values helm/values/dev.yaml \
              --set frontend.image.tag="${IMAGE_TAG}" \
              --set frontend.image.repository="${{ env.IMAGE_NAME }}" \
              --timeout 5m \
              --wait \
              --atomic; then
              echo "Helm deploy succeeded on attempt $i"
              break
            fi
            if [[ $i -lt $MAX_RETRIES ]]; then
              echo "::warning::Helm deploy failed, retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
              RETRY_DELAY=$((RETRY_DELAY * 2))
            else
              echo "::error::Helm deploy failed after $MAX_RETRIES attempts"
              exit 1
            fi
          done

          REVISION=$(helm history ecommerce -n ecommerce --max 1 -o json | jq -r '.[0].revision')
          echo "revision=$REVISION" >> "$GITHUB_OUTPUT"
          echo "::endgroup::"

      - name: Verify deployment health
        run: |
          echo "::group::Health Check — dev"
          echo "Waiting for rollout to complete..."
          kubectl rollout status deployment/ecommerce-frontend \
            -n ecommerce --timeout=120s

          echo "Checking pod readiness..."
          READY_PODS=$(kubectl get pods -n ecommerce -l app.kubernetes.io/component=frontend \
            -o jsonpath='{.items[*].status.conditions[?(@.type=="Ready")].status}' | tr ' ' '\n' | grep -c True || true)
          TOTAL_PODS=$(kubectl get pods -n ecommerce -l app.kubernetes.io/component=frontend --no-headers | wc -l)

          echo "Ready pods: $READY_PODS / $TOTAL_PODS"
          if [[ "$READY_PODS" -lt 1 ]]; then
            echo "::error::No pods are ready after deployment"
            kubectl describe pods -n ecommerce -l app.kubernetes.io/component=frontend
            exit 1
          fi

          echo "Checking liveness endpoint..."
          POD=$(kubectl get pods -n ecommerce -l app.kubernetes.io/component=frontend -o jsonpath='{.items[0].metadata.name}')
          kubectl exec "$POD" -n ecommerce -- curl -sf http://localhost:8080/health || {
            echo "::warning::Health endpoint not reachable via exec, checking service..."
          }
          echo "::endgroup::"

      - name: Post-deploy verification
        run: |
          echo "::group::Service Verification — dev"

          # Verify service exists and has endpoints
          ENDPOINTS=$(kubectl get endpoints ecommerce-frontend -n ecommerce -o jsonpath='{.subsets[*].addresses[*].ip}' 2>/dev/null || echo "")
          if [[ -z "$ENDPOINTS" ]]; then
            echo "::warning::No endpoints found for frontend service — LoadBalancer may still be provisioning"
          else
            echo "Service endpoints: $ENDPOINTS"
          fi

          # Get external IP if LoadBalancer is ready
          EXTERNAL_IP=$(kubectl get svc ecommerce-frontend -n ecommerce -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "pending")
          echo "External IP: $EXTERNAL_IP"

          echo "::endgroup::"

      - name: Deployment summary
        if: always()
        env:
          IMAGE_TAG: ${{ needs.setup.outputs.image_tag }}
          SHORT_SHA: ${{ needs.setup.outputs.short_sha }}
        run: |
          echo "## Deployment — dev" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Status | \`${{ job.status }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`${{ env.IMAGE_NAME }}:${IMAGE_TAG}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${SHORT_SHA}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Helm Revision | \`${{ steps.deploy.outputs.revision }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Namespace | \`ecommerce\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Actor | @${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Timestamp | $(date -u +%Y-%m-%dT%H:%M:%SZ) |" >> "$GITHUB_STEP_SUMMARY"

  # ──────────────────────────────────────────────────────────────────────────
  # Deploy — Staging (requires GitHub Environment approval)
  # ──────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy — staging
    runs-on: ubuntu-latest
    needs: [setup, build, deploy-dev]
    if: |
      always() &&
      needs.deploy-dev.result == 'success' &&
      (needs.setup.outputs.environment == 'staging' || needs.setup.outputs.environment == 'prod' || github.event_name == 'push')
    environment: staging
    outputs:
      helm_revision: ${{ steps.deploy.outputs.revision }}
    steps:
      - uses: actions/checkout@v5

      - name: Authenticate to GCP
        uses: ./.github/actions/gcp-auth
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}
          project_id: ${{ secrets.PROJECT_ID }}
          setup_gke: 'true'
          gke_cluster: ${{ secrets.CLUSTER_NAME }}
          gke_location: ${{ env.GKE_REGION }}

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: 'v3.17.0'

      - id: deploy
        name: Helm deploy (with retry)
        env:
          IMAGE_TAG: ${{ needs.setup.outputs.image_tag }}
        run: |
          echo "::group::Helm Deploy — staging"
          MAX_RETRIES=3
          RETRY_DELAY=10
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i of $MAX_RETRIES..."
            if helm upgrade --install ecommerce ${{ env.HELM_CHART_PATH }} \
              --namespace ecommerce \
              --create-namespace \
              --values helm/values/staging.yaml \
              --set frontend.image.tag="${IMAGE_TAG}" \
              --set frontend.image.repository="${{ env.IMAGE_NAME }}" \
              --timeout 5m \
              --wait \
              --atomic; then
              echo "Helm deploy succeeded on attempt $i"
              break
            fi
            if [[ $i -lt $MAX_RETRIES ]]; then
              echo "::warning::Helm deploy failed, retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
              RETRY_DELAY=$((RETRY_DELAY * 2))
            else
              echo "::error::Helm deploy failed after $MAX_RETRIES attempts"
              exit 1
            fi
          done

          REVISION=$(helm history ecommerce -n ecommerce --max 1 -o json | jq -r '.[0].revision')
          echo "revision=$REVISION" >> "$GITHUB_OUTPUT"
          echo "::endgroup::"

      - name: Verify deployment health
        run: |
          echo "::group::Health Check — staging"
          kubectl rollout status deployment/ecommerce-frontend \
            -n ecommerce --timeout=120s

          READY_PODS=$(kubectl get pods -n ecommerce -l app.kubernetes.io/component=frontend \
            -o jsonpath='{.items[*].status.conditions[?(@.type=="Ready")].status}' | tr ' ' '\n' | grep -c True || true)
          TOTAL_PODS=$(kubectl get pods -n ecommerce -l app.kubernetes.io/component=frontend --no-headers | wc -l)
          echo "Ready pods: $READY_PODS / $TOTAL_PODS"
          if [[ "$READY_PODS" -lt 1 ]]; then
            echo "::error::No pods are ready after deployment"
            exit 1
          fi
          echo "::endgroup::"

      - name: Smoke test
        run: |
          echo "::group::Smoke Test — staging"
          EXTERNAL_IP=$(kubectl get svc ecommerce-frontend -n ecommerce \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "")

          if [[ -n "$EXTERNAL_IP" ]]; then
            for i in $(seq 1 5); do
              HTTP_CODE=$(curl -so /dev/null -w '%{http_code}' --connect-timeout 5 "http://${EXTERNAL_IP}/" || echo "000")
              if [[ "$HTTP_CODE" == "200" ]]; then
                echo "Smoke test passed — HTTP $HTTP_CODE"
                break
              fi
              echo "Attempt $i: HTTP $HTTP_CODE — retrying in 10s..."
              sleep 10
            done
            if [[ "$HTTP_CODE" != "200" ]]; then
              echo "::warning::Smoke test did not return 200 — service may still be starting"
            fi
          else
            echo "::warning::No external IP yet — LoadBalancer still provisioning"
          fi
          echo "::endgroup::"

      - name: Deployment summary
        if: always()
        env:
          IMAGE_TAG: ${{ needs.setup.outputs.image_tag }}
          SHORT_SHA: ${{ needs.setup.outputs.short_sha }}
        run: |
          echo "## Deployment — staging" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Status | \`${{ job.status }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`${{ env.IMAGE_NAME }}:${IMAGE_TAG}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${SHORT_SHA}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Helm Revision | \`${{ steps.deploy.outputs.revision }}\` |" >> "$GITHUB_STEP_SUMMARY"

  # ──────────────────────────────────────────────────────────────────────────
  # Deploy — Production (requires GitHub Environment approval gate)
  # ──────────────────────────────────────────────────────────────────────────
  deploy-prod:
    name: Deploy — production
    runs-on: ubuntu-latest
    needs: [setup, build, deploy-staging]
    if: |
      always() &&
      needs.deploy-staging.result == 'success' &&
      (needs.setup.outputs.environment == 'prod' || github.event_name == 'push')
    environment: production
    outputs:
      helm_revision: ${{ steps.deploy.outputs.revision }}
    steps:
      - uses: actions/checkout@v5

      - name: Authenticate to GCP
        uses: ./.github/actions/gcp-auth
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}
          project_id: ${{ secrets.PROJECT_ID }}
          setup_gke: 'true'
          gke_cluster: ${{ secrets.CLUSTER_NAME }}
          gke_location: ${{ env.GKE_REGION }}

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: 'v3.17.0'

      - name: Pre-deploy snapshot
        id: pre_deploy
        run: |
          echo "::group::Pre-deploy Snapshot — production"
          CURRENT_REVISION=$(helm history ecommerce -n ecommerce --max 1 -o json 2>/dev/null | jq -r '.[0].revision' || echo "0")
          echo "current_revision=$CURRENT_REVISION" >> "$GITHUB_OUTPUT"
          echo "Previous Helm revision: $CURRENT_REVISION"

          kubectl get pods -n ecommerce -o wide 2>/dev/null || echo "No existing pods"
          echo "::endgroup::"

      - id: deploy
        name: Helm deploy (with retry)
        env:
          IMAGE_TAG: ${{ needs.setup.outputs.image_tag }}
        run: |
          echo "::group::Helm Deploy — production"
          MAX_RETRIES=3
          RETRY_DELAY=15
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i of $MAX_RETRIES..."
            if helm upgrade --install ecommerce ${{ env.HELM_CHART_PATH }} \
              --namespace ecommerce \
              --create-namespace \
              --values helm/values/prod.yaml \
              --set frontend.image.tag="${IMAGE_TAG}" \
              --set frontend.image.repository="${{ env.IMAGE_NAME }}" \
              --timeout 8m \
              --wait \
              --atomic; then
              echo "Helm deploy succeeded on attempt $i"
              break
            fi
            if [[ $i -lt $MAX_RETRIES ]]; then
              echo "::warning::Helm deploy failed, retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
              RETRY_DELAY=$((RETRY_DELAY * 2))
            else
              echo "::error::Helm deploy failed after $MAX_RETRIES attempts"
              exit 1
            fi
          done

          REVISION=$(helm history ecommerce -n ecommerce --max 1 -o json | jq -r '.[0].revision')
          echo "revision=$REVISION" >> "$GITHUB_OUTPUT"
          echo "::endgroup::"

      - name: Verify deployment health
        run: |
          echo "::group::Health Check — production"
          kubectl rollout status deployment/ecommerce-frontend \
            -n ecommerce --timeout=180s

          READY_PODS=$(kubectl get pods -n ecommerce -l app.kubernetes.io/component=frontend \
            -o jsonpath='{.items[*].status.conditions[?(@.type=="Ready")].status}' | tr ' ' '\n' | grep -c True || true)
          DESIRED=$(kubectl get deployment ecommerce-frontend -n ecommerce -o jsonpath='{.spec.replicas}')
          echo "Ready pods: $READY_PODS / $DESIRED"

          if [[ "$READY_PODS" -lt "$DESIRED" ]]; then
            echo "::error::Not all pods are ready — triggering auto-rollback"
            helm rollback ecommerce ${{ steps.pre_deploy.outputs.current_revision }} -n ecommerce --wait
            exit 1
          fi
          echo "::endgroup::"

      - name: Production smoke test
        run: |
          echo "::group::Smoke Test — production"
          EXTERNAL_IP=$(kubectl get svc ecommerce-frontend -n ecommerce \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "")

          if [[ -n "$EXTERNAL_IP" ]]; then
            PASSED=false
            for i in $(seq 1 6); do
              HTTP_CODE=$(curl -so /dev/null -w '%{http_code}' --connect-timeout 5 "http://${EXTERNAL_IP}/" || echo "000")
              if [[ "$HTTP_CODE" == "200" ]]; then
                echo "Smoke test PASSED — HTTP $HTTP_CODE"
                PASSED=true
                break
              fi
              echo "Attempt $i: HTTP $HTTP_CODE — retrying in 10s..."
              sleep 10
            done
            if [[ "$PASSED" != "true" ]]; then
              echo "::error::Production smoke test failed — initiating rollback"
              helm rollback ecommerce ${{ steps.pre_deploy.outputs.current_revision }} -n ecommerce --wait
              exit 1
            fi
          else
            echo "::warning::No external IP — LoadBalancer still provisioning"
          fi
          echo "::endgroup::"

      - name: Deployment summary
        if: always()
        env:
          IMAGE_TAG: ${{ needs.setup.outputs.image_tag }}
          SHORT_SHA: ${{ needs.setup.outputs.short_sha }}
        run: |
          echo "## Deployment — production" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Status | \`${{ job.status }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`${{ env.IMAGE_NAME }}:${IMAGE_TAG}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${SHORT_SHA}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Helm Revision | \`${{ steps.deploy.outputs.revision }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Previous Revision | \`${{ steps.pre_deploy.outputs.current_revision }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Timestamp | $(date -u +%Y-%m-%dT%H:%M:%SZ) |" >> "$GITHUB_STEP_SUMMARY"

  # ──────────────────────────────────────────────────────────────────────────
  # Deploy Monitoring Stack (runs after app deploy)
  # ──────────────────────────────────────────────────────────────────────────
  deploy-monitoring:
    name: Deploy Monitoring
    runs-on: ubuntu-latest
    needs: [setup, deploy-dev]
    if: needs.deploy-dev.result == 'success'
    steps:
      - uses: actions/checkout@v5

      - name: Authenticate to GCP
        uses: ./.github/actions/gcp-auth
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}
          project_id: ${{ secrets.PROJECT_ID }}
          setup_gke: 'true'
          gke_cluster: ${{ secrets.CLUSTER_NAME }}
          gke_location: ${{ env.GKE_REGION }}

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: 'v3.17.0'

      - name: Deploy Prometheus + Grafana
        run: |
          echo "::group::Monitoring Stack"
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update

          helm upgrade --install monitoring prometheus-community/kube-prometheus-stack \
            --namespace monitoring \
            --create-namespace \
            --set grafana.adminPassword='${{ secrets.GRAFANA_ADMIN_PASSWORD }}' \
            --set prometheus.prometheusSpec.retention=7d \
            --timeout 8m \
            --wait || echo "::warning::Monitoring deploy had issues — non-blocking"
          echo "::endgroup::"
