name: Terraform CI/CD

on:
  push:
    branches: [ \"main\" ]
    paths:
      - 'terraform/**'
  pull_request:
    paths:
      - 'terraform/**'

env:
  TF_VERSION: '1.5.*'
  ENV: ${{ github.event.inputs.environment || 'dev' }}

jobs:
  terraform:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - id: 'auth'
      name: 'Authenticate to Google Cloud'
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Terraform Init
      run: cd terraform/envs/${{ env.ENV }} && terraform init

    - name: Terraform Format
      run: cd terraform/envs/${{ env.ENV }} && terraform fmt -check

    - name: Terraform Plan
      id: plan
      run: cd terraform/envs/${{ env.ENV }} && terraform plan -no-color -input=false

    - name: Terraform Apply (on main)
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: cd terraform/envs/${{ env.ENV }} && terraform apply -auto-approve -input=false

    - name: Manual Approval (prod)
      if: env.ENV == 'prod'
      uses: trstringer/manual-approval@v1
      with:
        secret: APPROVAL_SECRET
        approvers: user1,user2

  plan-comment:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}
    - uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}
    - name: Terraform Plan
      id: plan
      run: cd terraform/envs/${{ env.ENV }} && terraform init && terraform plan -no-color -out=tfplan
    - uses: actions/github-script@v7
      with:
        script: |
          const output = `${{ steps.plan.outputs.stdout }}`;
          github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body: '### Terraform Plan\n```\n' + output + '\n```',
          });

