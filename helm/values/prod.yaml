# ==============================================================================
# Helm Values — production environment
# ==============================================================================
# High availability, generous resource limits, ingress with TLS-ready config
# ==============================================================================

replicaCount: 1

frontend:
  enabled: true
  replicas: 3
  image:
    repository: europe-west1-docker.pkg.dev/project-bedrock-gcp/ecommerce-frontend/ecommerce-frontend
    tag: "latest"
    pullPolicy: IfNotPresent
  service:
    type: LoadBalancer
    port: 80
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

backend:
  enabled: true
  replicas: 3
  image:
    repository: gcr.io/google-samples/hello-app
    tag: "1.0"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080

ingress:
  enabled: true
  className: gce
  annotations:
    kubernetes.io/ingress.class: gce
    kubernetes.io/ingress.global-static-ip-name: ecommerce-ip
    ingress.kubernetes.io/force-ssl-redirect: "true"
  hosts:
    - host: ecommerce.local
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 250m
  limits:
    cpu: 500m
